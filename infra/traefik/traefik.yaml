api:
  insecure: true

entryPoints:
  web:
    address: :80
  websecure:
    address: :443

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik
    watch: true

certificatesResolvers:
  le-resolver:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
